syntax = "proto3";
package tongsim_lite.voxel;

import "tongsim_lite_protobuf/common.proto";
import "tongsim_lite_protobuf/object.proto";

service VoxelService {
  rpc QueryVoxel(QueryVoxelRequest) returns (Voxel);
  rpc QueryAgentVoxel(QueryAgentVoxelRequest) returns (QueryAgentVoxelResponse);
}

message QueryVoxelRequest{
  tongsim_lite.common.Transform transform = 1;
  int32 voxel_num_x = 2;
  int32 voxel_num_y = 3;
  int32 voxel_num_z = 4;
  tongsim_lite.common.Vector3f extent = 5;
  repeated tongsim_lite.object.ObjectId ActorsToIgnore = 6;
}

message Voxel{
  bytes voxel_buffer = 1;
}

message QueryAgentVoxelRequest{
  tongsim_lite.object.ObjectId agent_id = 1;
  optional int32 voxel_num_x = 2;
  optional int32 voxel_num_y = 3;
  optional int32 voxel_num_z = 4;
  optional tongsim_lite.common.Vector3f extent = 5;
}

message QueryAgentVoxelResponse{
  Voxel voxel = 1;
  tongsim_lite.common.Transform agent_transform = 2;
  double timestamp = 3;
}
